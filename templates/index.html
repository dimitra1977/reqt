<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Requirements Browser</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <div class="container-fluid p-3">
      <div class="d-flex mb-2">
        <input id="searchInput" class="form-control me-2" placeholder="Search requirements...">
        <button id="searchBtn" class="btn btn-primary me-2">Search</button>
        <button id="clearBtn" class="btn btn-secondary">Clear</button>
      </div>

      <div class="row">
        <div class="col-5" id="treeCol">
          <div class="card">
            <div class="card-body">
              <h5 class="card-title">Requirements</h5>
              <div id="requirementsTree" class="requirements-tree"></div>
            </div>
          </div>
        </div>
        <div class="col-7" id="detailCol">
          <div class="card">
            <div class="card-body">
              <h5 class="card-title">Detail</h5>
              <form id="detailForm">
                <div class="mb-3">
                  <label class="form-label">Summary</label>
                  <input id="summary" class="form-control">
                </div>
                <div class="mb-3">
                  <label class="form-label">Description</label>
                  <textarea id="description" class="form-control" rows="4"></textarea>
                </div>
                <div class="mb-3 row">
                  <div class="col">
                    <label class="form-label">Level</label>
                    <select id="level" class="form-select">
                      <option value="0">Feature</option>
                      <option value="1">User Story</option>
                      <option value="2">System Requirement</option>
                      <option value="3">Sub-System / Interface Requirement</option>
                      <option value="4">Software / Hardware Requirement</option>
                    </select>
                  </div>
                  <div class="col">
                    <label class="form-label">Parent</label>
                    <select id="parent" class="form-select"></select>
                  </div>
                </div>

                <div class="mb-3 row">
                  <div class="col"><input id="custom_field_1" placeholder="Custom Field 1" class="form-control"></div>
                  <div class="col"><input id="custom_field_2" placeholder="Custom Field 2" class="form-control"></div>
                </div>
                <div class="mb-3 row">
                  <div class="col"><input id="custom_field_3" placeholder="Custom Field 3" class="form-control"></div>
                  <div class="col"><input id="custom_field_4" placeholder="Custom Field 4" class="form-control"></div>
                </div>

                <div class="d-flex">
                  <button id="newRootBtn" type="button" class="btn btn-outline-primary me-2">New Root Requirement</button>
                  <button id="newChildBtn" type="button" class="btn btn-outline-primary me-2">New Child Requirement</button>
                  <button id="saveBtn" type="button" class="btn btn-success me-2">Save</button>
                  <button id="deleteBtn" type="button" class="btn btn-danger">Delete</button>
                </div>

              </form>
              <div class="mt-2" id="status">Ready</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
